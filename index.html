<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transmissão de Tela – WebRTC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Transmissão de Tela em Tempo Real</h1>

    <div class="status-bar">
      <span>Status:</span>
      <span id="status">Desconectado</span>
    </div>

    <div class="input-row">
      <button id="btn-start">Iniciar Transmissão</button>
      <button id="btn-stop" disabled>Parar</button>
    </div>

    <div class="video-area">
      <video id="video" autoplay playsinline></video>
      <div id="placeholder">Aguardando transmissão...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
